spec_version: "0.1.0"
name: gitmind
version: 1.0.0
description: "Self-evolving AI agent that learns from interactions, commits knowledge to git, and evolves through PR-based human review"
author: gitmind-hackathon
license: MIT

model:
  preferred: groq:meta-llama/llama-4-scout-17b-16e-instruct
  fallback:
    - groq:llama-3.3-70b-versatile
    - google:gemini-2.0-flash
  constraints:
    temperature: 0.7
    max_tokens: 4096

skills:
  - learn
  - commit-learning
  - propose-change
  - reflect
  - explain-evolution

tools:
  - git-ops

runtime:
  max_turns: 100
  timeout: 300

tags:
  - hackathon
  - self-evolving
  - git-native
  - learning-agent
  - human-in-the-loop
